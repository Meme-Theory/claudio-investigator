name: Manual investigation

# Per-run display title surfaces the artist name in the Actions UI and — more
# importantly — in the GitHub REST API's runs-list response. External clients
# (the meme-engine-web frontend) match dispatched runs by substring on this
# field, so don't drop it without coordinating with that side.
run-name: "Investigate: ${{ inputs.artist_name }}"

# Click "Run workflow" in the Actions tab to investigate one artist on demand,
# without having to file an issue. The Phase 3 issue-based flow isn't wired
# up yet — this is the path to use until then.
on:
  workflow_dispatch:
    inputs:
      artist_name:
        description: 'Artist name to investigate (required)'
        required: true
        type: string
      youtube_url:
        description: 'YouTube / YouTube Music URL hint (optional)'
        required: false
        type: string
      apple_url:
        description: 'Apple Music URL hint (optional)'
        required: false
        type: string
      notes:
        description: 'Submitter notes (optional)'
        required: false
        type: string

jobs:
  investigate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      # ref: main so that GitHub's "Re-run" button picks up the LATEST
      # code on main, not the SHA the workflow was originally dispatched
      # against. We don't need run-to-run replayability for ad-hoc
      # investigations — we need "run the current code." If we ever want
      # versioned acceptance runs later, switch back to the default behavior.
      - uses: actions/checkout@v4
        with:
          ref: main

      # Preflight: if this artist is already in data/investigations.jsonl with
      # a confident-enough, recent-enough verdict, skip the whole investigation.
      # The ledger acts as a cache; re-running the agent on a known-good entry
      # is a waste of $0.04 + tokens. Thresholds are deliberately conservative:
      # confidence >= 0.85 AND <90 days old. Below either bar we re-investigate.
      # Set output `skip=true` to short-circuit the downstream steps.
      - name: Preflight — skip if already confidently investigated
        id: preflight
        env:
          ARTIST: ${{ inputs.artist_name }}
        run: |
          python3 <<'PY'
          import datetime
          import json
          import os
          import pathlib
          import re

          THRESHOLD_CONF = 0.85
          THRESHOLD_DAYS = 90

          def norm(s: str) -> str:
              return re.sub(r"\s+", " ", (s or "").lower()).strip()

          def proceed(reason: str) -> None:
              print(f"proceeding with full investigation: {reason}")

          def skip(row: dict, age_days: int) -> None:
              # Reconstruct the verdict.json shape that main.py would have
              # produced so external consumers (the meme-engine-web frontend
              # and any future API client) see a uniform artifact regardless
              # of whether the verdict was freshly computed or cache-served.
              # The `cached` flag + source-run pointers let consumers tell
              # the difference if they care; the verdict payload is identical
              # in shape to a real run.
              payload = {
                  "artist": row["artist"],
                  "verdict": {
                      "verdict": row["verdict"],
                      "confidence": row["confidence"],
                      "markers": row.get("markers", []),
                      "evidence": row.get("evidence", []),
                      "reasoning": row.get("reasoning"),
                      "auto_merge_recommended": row.get("auto_merge_recommended", False),
                  },
                  "terminated_by": row.get("terminated_by"),
                  "budget": row.get("budget"),
                  "model": row.get("model"),
                  "completed_at": row.get("completed_at"),
                  "cached": True,
                  "cache_source_run_id": row.get("run_id"),
                  "cache_source_run_url": row.get("run_url"),
                  "cache_age_days": age_days,
              }
              artifacts_dir = pathlib.Path("artifacts")
              artifacts_dir.mkdir(exist_ok=True)
              (artifacts_dir / "verdict.json").write_text(
                  json.dumps(payload, indent=2, default=str),
                  encoding="utf-8",
              )

              msg = (
                  f"Skipped — `{row['artist']}` already in ledger as "
                  f"**{row['verdict']}** (confidence {row['confidence']:.2f}, "
                  f"{age_days}d ago). "
                  f"Source run: {row.get('run_url', 'n/a')}"
              )
              print(msg)
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("skip=true\n")
              with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
                  f.write(f"## Preflight skip (cache hit)\n\n{msg}\n\n"
                          f"_Re-run by deleting the existing row from "
                          f"`data/investigations.jsonl` or by waiting until it "
                          f"ages past {THRESHOLD_DAYS} days._\n")

          artist = os.environ["ARTIST"]
          key = norm(artist)
          ledger = pathlib.Path("data/investigations.jsonl")

          if not ledger.exists():
              proceed("ledger does not exist yet")
              raise SystemExit(0)

          matches = []
          for line in ledger.read_text(encoding="utf-8").splitlines():
              if not line.strip():
                  continue
              try:
                  row = json.loads(line)
              except json.JSONDecodeError:
                  continue
              if norm(row.get("artist", "")) == key:
                  matches.append(row)

          if not matches:
              proceed(f"`{artist}` not in ledger")
              raise SystemExit(0)

          matches.sort(key=lambda r: r.get("completed_at") or "")
          latest = matches[-1]
          conf = latest.get("confidence") or 0.0

          if conf < THRESHOLD_CONF:
              proceed(f"existing confidence {conf:.2f} < {THRESHOLD_CONF}")
              raise SystemExit(0)

          completed = latest.get("completed_at") or ""
          try:
              ts = datetime.datetime.fromisoformat(completed.replace("Z", "+00:00"))
          except Exception as e:
              proceed(f"unparseable completed_at ({e!r})")
              raise SystemExit(0)

          age_days = (datetime.datetime.now(datetime.timezone.utc) - ts).days

          if age_days > THRESHOLD_DAYS:
              proceed(f"ledger row is {age_days}d old > {THRESHOLD_DAYS}")
              raise SystemExit(0)

          skip(latest, age_days)
          PY

      - uses: actions/setup-python@v5
        if: steps.preflight.outputs.skip != 'true'
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        if: steps.preflight.outputs.skip != 'true'
        run: pip install -r requirements.txt

      - name: Run investigation
        if: steps.preflight.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GENIUS_TOKEN: ${{ secrets.GENIUS_TOKEN }}
          DISCOGS_TOKEN: ${{ secrets.DISCOGS_TOKEN }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          MUSICBRAINZ_USER_AGENT: 'ClAudioInvestigator/0.0.1 (+https://github.com/${{ github.repository }})'
          ARTIST: ${{ inputs.artist_name }}
          YOUTUBE_URL: ${{ inputs.youtube_url }}
          APPLE_URL: ${{ inputs.apple_url }}
          NOTES: ${{ inputs.notes }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          # Build the CLI arg list from optional inputs.
          args=("$ARTIST")
          [ -n "$YOUTUBE_URL" ] && args+=(--youtube-url "$YOUTUBE_URL")
          [ -n "$APPLE_URL" ]   && args+=(--apple-url "$APPLE_URL")
          [ -n "$NOTES" ]       && args+=(--notes "$NOTES")
          python -m investigator.main investigate "${args[@]}" --transcript \
            | tee artifacts/verdict.json

      - name: Render verdict to step summary
        if: always()
        run: |
          {
            echo "## Verdict — \`${ARTIST}\`"
            echo
            if [ -s artifacts/verdict.json ]; then
              echo '```json'
              cat artifacts/verdict.json
              echo '```'
            else
              echo "_(no output produced — see the run logs)_"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          ARTIST: ${{ inputs.artist_name }}

      - name: Upload verdict artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verdict-${{ github.run_id }}
          path: artifacts/verdict.json
          if-no-files-found: ignore

      # Write one row per artist to data/investigations.jsonl on main. Latest
      # verdict wins — runs for the same artist (case-insensitive, whitespace-
      # collapsed) replace prior rows. Failed runs (no verdict submitted by
      # the agent) are not logged at all. The retry loop survives concurrent
      # dispatches: each iteration resets to origin/main, re-dedups, re-pushes.
      - name: Update investigation ledger
        if: success() && steps.preflight.outputs.skip != 'true'
        env:
          ARTIST: ${{ inputs.artist_name }}
          GH_REPO: ${{ github.repository }}
          GH_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          if [ ! -s artifacts/verdict.json ]; then
            echo "No verdict.json on disk — skipping ledger update."
            exit 0
          fi

          if [ "$(jq -r '.verdict.verdict // "null"' artifacts/verdict.json)" = "null" ]; then
            echo "Agent did not submit a verdict (null) — skipping ledger update."
            exit 0
          fi

          LEDGER_LINE=$(jq -c \
            --arg run_id "$GH_RUN_ID" \
            --arg run_url "https://github.com/${GH_REPO}/actions/runs/${GH_RUN_ID}" \
            '{
              artist: .artist,
              verdict: .verdict.verdict,
              confidence: .verdict.confidence,
              markers: (.verdict.markers // []),
              evidence: (.verdict.evidence // []),
              reasoning: .verdict.reasoning,
              auto_merge_recommended: (.verdict.auto_merge_recommended // false),
              model: .model,
              terminated_by: .terminated_by,
              budget: .budget,
              completed_at: .completed_at,
              run_id: $run_id,
              run_url: $run_url
            }' artifacts/verdict.json)
          export LEDGER_LINE

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main

            python <<'PY'
          import json, os, re, pathlib

          def norm(s: str) -> str:
              return re.sub(r"\s+", " ", (s or "").lower()).strip()

          new = json.loads(os.environ["LEDGER_LINE"])

          # --- Schema validation -------------------------------------------
          # Sanity-check before this row lands in the ledger. Raises here fail
          # the workflow step rather than corrupting the ledger silently.
          REQUIRED_FIELDS = ("artist", "verdict", "confidence", "model",
                             "completed_at", "run_id")
          missing = [f for f in REQUIRED_FIELDS if f not in new]
          if missing:
              raise SystemExit(f"ledger row missing required fields: {missing}")

          VALID_VERDICTS = ("ai", "likely_ai", "unclear", "likely_human", "human")
          if new["verdict"] not in VALID_VERDICTS:
              raise SystemExit(f"invalid verdict label: {new['verdict']!r}")

          conf = new.get("confidence")
          if not isinstance(conf, (int, float)) or not (0.0 <= conf <= 1.0):
              raise SystemExit(f"confidence out of range or wrong type: {conf!r}")

          if not isinstance(new.get("artist"), str) or not new["artist"].strip():
              raise SystemExit("artist field is empty or non-string")

          # --- Dedup + regression detection --------------------------------
          key = norm(new["artist"])
          p = pathlib.Path("data/investigations.jsonl")
          rows = []
          existing = None
          if p.exists():
              for ln in p.read_text(encoding="utf-8").splitlines():
                  if not ln.strip():
                      continue
                  row = json.loads(ln)
                  if norm(row.get("artist", "")) == key:
                      existing = row
                  else:
                      rows.append(row)

          # If the dedup found a row and the new verdict crosses the AI/human
          # boundary without a confidence increase, that's a regression worth
          # auditing. Preserve the prior verdict on the new row instead of
          # silently swapping. Doesn't block the swap — just records it.
          AI_LABELS = {"ai", "likely_ai"}
          HUMAN_LABELS = {"likely_human", "human"}
          if existing is not None:
              old_v = existing.get("verdict")
              old_c = existing.get("confidence") or 0.0
              flipped = (
                  (old_v in AI_LABELS and new["verdict"] in HUMAN_LABELS)
                  or (old_v in HUMAN_LABELS and new["verdict"] in AI_LABELS)
              )
              if flipped and conf <= old_c:
                  new["previous_verdict"] = {
                      "verdict": old_v,
                      "confidence": old_c,
                      "completed_at": existing.get("completed_at"),
                      "run_id": existing.get("run_id"),
                      "model": existing.get("model"),
                  }
                  new["regression_note"] = (
                      f"Verdict flipped {old_v} ({old_c:.2f}) "
                      f"-> {new['verdict']} ({conf:.2f}) without confidence "
                      f"increase. Previous row preserved for audit."
                  )
                  print(f"WARNING: regression flagged ({old_v} -> {new['verdict']}); "
                        f"previous_verdict preserved on new row")

          rows.append(new)
          rows.sort(key=lambda r: r.get("completed_at") or "")

          p.parent.mkdir(parents=True, exist_ok=True)
          p.write_text(
              "\n".join(json.dumps(r, separators=(",", ":")) for r in rows) + "\n",
              encoding="utf-8",
          )
          PY

            git add data/investigations.jsonl
            if git diff --cached --quiet; then
              echo "Ledger unchanged (idempotent re-run) — nothing to push."
              exit 0
            fi
            git commit -m "log(investigation): ${ARTIST}"
            if git push origin HEAD:main; then
              echo "Ledger updated on attempt ${attempt}."
              exit 0
            fi
            echo "Push attempt ${attempt} lost the race; refetching and retrying..."
            sleep $((RANDOM % 3 + 1))
          done

          echo "Failed to push ledger update after 5 attempts."
          exit 1
