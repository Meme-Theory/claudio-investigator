name: Manual investigation

# Per-run display title surfaces the artist name in the Actions UI and — more
# importantly — in the GitHub REST API's runs-list response. External clients
# (the meme-engine-web frontend) match dispatched runs by substring on this
# field, so don't drop it without coordinating with that side.
run-name: "Investigate: ${{ inputs.artist_name }}"

# Click "Run workflow" in the Actions tab to investigate one artist on demand,
# without having to file an issue. The Phase 3 issue-based flow isn't wired
# up yet — this is the path to use until then.
on:
  workflow_dispatch:
    inputs:
      artist_name:
        description: 'Artist name to investigate (required)'
        required: true
        type: string
      spotify_url:
        description: 'Spotify URL hint (optional)'
        required: false
        type: string
      youtube_url:
        description: 'YouTube / YouTube Music URL hint (optional)'
        required: false
        type: string
      apple_url:
        description: 'Apple Music URL hint (optional)'
        required: false
        type: string
      notes:
        description: 'Submitter notes (optional)'
        required: false
        type: string

jobs:
  investigate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      # ref: main so that GitHub's "Re-run" button picks up the LATEST
      # code on main, not the SHA the workflow was originally dispatched
      # against. We don't need run-to-run replayability for ad-hoc
      # investigations — we need "run the current code." If we ever want
      # versioned acceptance runs later, switch back to the default behavior.
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run investigation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GENIUS_TOKEN: ${{ secrets.GENIUS_TOKEN }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          DISCOGS_TOKEN: ${{ secrets.DISCOGS_TOKEN }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          MUSICBRAINZ_USER_AGENT: 'ClAudioInvestigator/0.0.1 (+https://github.com/${{ github.repository }})'
          ARTIST: ${{ inputs.artist_name }}
          SPOTIFY_URL: ${{ inputs.spotify_url }}
          YOUTUBE_URL: ${{ inputs.youtube_url }}
          APPLE_URL: ${{ inputs.apple_url }}
          NOTES: ${{ inputs.notes }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          # Build the CLI arg list from optional inputs.
          args=("$ARTIST")
          [ -n "$SPOTIFY_URL" ] && args+=(--spotify-url "$SPOTIFY_URL")
          [ -n "$YOUTUBE_URL" ] && args+=(--youtube-url "$YOUTUBE_URL")
          [ -n "$APPLE_URL" ]   && args+=(--apple-url "$APPLE_URL")
          [ -n "$NOTES" ]       && args+=(--notes "$NOTES")
          python -m investigator.main investigate "${args[@]}" --transcript \
            | tee artifacts/verdict.json

      - name: Render verdict to step summary
        if: always()
        run: |
          {
            echo "## Verdict — \`${ARTIST}\`"
            echo
            if [ -s artifacts/verdict.json ]; then
              echo '```json'
              cat artifacts/verdict.json
              echo '```'
            else
              echo "_(no output produced — see the run logs)_"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          ARTIST: ${{ inputs.artist_name }}

      - name: Upload verdict artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verdict-${{ github.run_id }}
          path: artifacts/verdict.json
          if-no-files-found: ignore

      # Write one row per artist to data/investigations.jsonl on main. Latest
      # verdict wins — runs for the same artist (case-insensitive, whitespace-
      # collapsed) replace prior rows. Failed runs (no verdict submitted by
      # the agent) are not logged at all. The retry loop survives concurrent
      # dispatches: each iteration resets to origin/main, re-dedups, re-pushes.
      - name: Update investigation ledger
        if: success()
        env:
          ARTIST: ${{ inputs.artist_name }}
          GH_REPO: ${{ github.repository }}
          GH_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          if [ ! -s artifacts/verdict.json ]; then
            echo "No verdict.json on disk — skipping ledger update."
            exit 0
          fi

          if [ "$(jq -r '.verdict.verdict // "null"' artifacts/verdict.json)" = "null" ]; then
            echo "Agent did not submit a verdict (null) — skipping ledger update."
            exit 0
          fi

          LEDGER_LINE=$(jq -c \
            --arg run_id "$GH_RUN_ID" \
            --arg run_url "https://github.com/${GH_REPO}/actions/runs/${GH_RUN_ID}" \
            '{
              artist: .artist,
              verdict: .verdict.verdict,
              confidence: .verdict.confidence,
              markers: (.verdict.markers // []),
              evidence: (.verdict.evidence // []),
              reasoning: .verdict.reasoning,
              auto_merge_recommended: (.verdict.auto_merge_recommended // false),
              model: .model,
              terminated_by: .terminated_by,
              budget: .budget,
              completed_at: .completed_at,
              run_id: $run_id,
              run_url: $run_url
            }' artifacts/verdict.json)
          export LEDGER_LINE

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main

            python <<'PY'
          import json, os, re, pathlib

          def norm(s: str) -> str:
              return re.sub(r"\s+", " ", (s or "").lower()).strip()

          new = json.loads(os.environ["LEDGER_LINE"])
          key = norm(new["artist"])

          p = pathlib.Path("data/investigations.jsonl")
          rows = []
          if p.exists():
              for ln in p.read_text(encoding="utf-8").splitlines():
                  if not ln.strip():
                      continue
                  row = json.loads(ln)
                  if norm(row.get("artist", "")) != key:
                      rows.append(row)
          rows.append(new)
          rows.sort(key=lambda r: r.get("completed_at") or "")

          p.parent.mkdir(parents=True, exist_ok=True)
          p.write_text(
              "\n".join(json.dumps(r, separators=(",", ":")) for r in rows) + "\n",
              encoding="utf-8",
          )
          PY

            git add data/investigations.jsonl
            if git diff --cached --quiet; then
              echo "Ledger unchanged (idempotent re-run) — nothing to push."
              exit 0
            fi
            git commit -m "log(investigation): ${ARTIST}"
            if git push origin HEAD:main; then
              echo "Ledger updated on attempt ${attempt}."
              exit 0
            fi
            echo "Push attempt ${attempt} lost the race; refetching and retrying..."
            sleep $((RANDOM % 3 + 1))
          done

          echo "Failed to push ledger update after 5 attempts."
          exit 1
