name: Quarterly Re-investigation

on:
  schedule:
    # 06:00 UTC on the 1st of every third month (Jan/Apr/Jul/Oct).
    - cron: '0 6 1 */3 *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max entries to re-investigate this run (omit for all)'
        required: false
        type: number

jobs:
  reinvestigate:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # large batches; tune once we have a feel for cost-per-entry
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Re-investigate all entries
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          DISCOGS_TOKEN: ${{ secrets.DISCOGS_TOKEN }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          GENIUS_TOKEN: ${{ secrets.GENIUS_TOKEN }}
          MUSICBRAINZ_USER_AGENT: 'ClAudioInvestigator/0.0.1 (https://github.com/${{ github.repository }})'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [ -n "${{ inputs.limit }}" ]; then
            python -m investigator.main reinvestigate-all --limit ${{ inputs.limit }}
          else
            python -m investigator.main reinvestigate-all
          fi
